<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Inserimento dati - dia-project</title>
     <link rel="stylesheet" href="static/style/style.css">
</head>
<body>
    <h1>Progetto DIA - Previsione colture e fertilizzanti</h1>
    <p>Inserisci i parametri all'interno dei campi: </p>

    <form action="/predict" method="POST">
        <div class="form-group">
            <label for="soil">Tipo di Suolo:
            <select id="soil" name="Soil" required>
                <option value="Sandy">Sabbioso (Sandy)</option>
                <option value="Loamy">Limoso (Loamy)</option>
                <option value="Black">Nero (Black)</option>
                <option value="Red">Rosso (Red)</option>
                <option value="Clayey">Argilloso (Clayey)</option>
            </select>
            </label> </br>

            <label>Azoto (N):<input type="number" step="0.1" name="Nitrogen" required> </label> </br>

            <label>Fosforo (P):<input type="number" step="0.1" name="Phosphorus" required></label> </br>

            <label>Potassio (K):<input type="number" step="0.1" name="Potassium" required></label></br>

            <label>Valore pH:<input type="number" step="0.1" name="pH_Value" required></label></br>

            <label>Temperatura (°C):<input type="number" step="0.1" name="Temperature" required></label></br>

            <label>Umidità (%):<input type="number" step="0.1" name="Humidity" required></label> </br>

            <label>Pioggia (mm):<input type="number" step="0.1" name="Rainfall" required></label> </br>

            <label>Carbonio (C):<input type="number" step="0.1" name="Carbon" required></label></br>

            <button type="submit">Invia</button>
        </div>
    </form>
</body>
</html>
